<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Trip — Fleet Coordinator</title>
  <link rel="icon" href="../../favicon.ico" />
  <link rel="manifest" href="../../manifest.json" />

  <link rel="stylesheet" href="../../css/base/variables.css" />
  <link rel="stylesheet" href="../../css/base/reset.css" />
  <link rel="stylesheet" href="../../css/base/typography.css" />
  <link rel="stylesheet" href="../../css/base/layout.css" />
  <link rel="stylesheet" href="../../css/components/button.css" />
  <link rel="stylesheet" href="../../css/components/input.css" />
  <link rel="stylesheet" href="../../css/components/card.css" />
  <link rel="stylesheet" href="../../css/components/modal.css" />
  <link rel="stylesheet" href="../../css/components/navbar.css" />
  <link rel="stylesheet" href="../../css/components/notification-bell.css" />
  <link rel="stylesheet" href="../../css/pages/new-trip.css" />
  <link rel="stylesheet" href="../../css/pages/edit-trip.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-wrapper">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">Edit Trip</h1>
        <a href="history.html" class="btn btn-secondary">← Back to History</a>
      </div>

      <div id="page-error" class="alert alert-danger hidden" role="alert"></div>

      <div id="loading" class="loading-overlay">
        <span class="spinner"></span>
        Loading trip…
      </div>

      <div id="form-section" class="hidden">
        <div class="edit-trip-meta">
          Trip ID: <strong id="trip-id-label"></strong>
        </div>

        <div id="form-error" class="alert alert-danger hidden" role="alert"></div>

        <form id="trip-form" novalidate>
          <div class="card trip-form-card">
            <div class="card-header"><span class="card-title">Trip Details</span></div>
            <div class="card-body">

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="trip-date">Date <span class="required">*</span></label>
                  <input type="date" id="trip-date" class="form-control" data-field="date" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="wh-rep">WH Representative <span class="required">*</span></label>
                  <select id="whRep" class="form-control" data-field="whRep">
                    <option value="">Loading…</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="driver">Driver <span class="required">*</span></label>
                  <input type="text" id="driver" class="form-control" data-field="driver" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="route">Route <span class="required">*</span></label>
                  <input type="text" id="route" class="form-control" data-field="route" />
                </div>
              </div>

              <div class="cost-section">
                <div class="cost-section-title">Costs</div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label" for="laborCost">Labor Cost ($)</label>
                    <input type="number" id="laborCost" class="form-control" placeholder="0.00" min="0" step="0.01" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="parkCost">Parking Cost ($)</label>
                    <input type="number" id="parkCost" class="form-control" placeholder="0.00" min="0" step="0.01" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="truckCost">Truck Cost ($)</label>
                    <input type="number" id="truckCost" class="form-control" placeholder="0.00" min="0" step="0.01" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="hotelCost">Hotel Cost ($)</label>
                    <input type="number" id="hotelCost" class="form-control" placeholder="0.00" min="0" step="0.01" />
                  </div>
                </div>
              </div>

              <div class="cost-preview">
                <div class="cost-preview-title">Cost Preview</div>
                <div class="cost-preview-total">
                  <span>Total</span><span id="preview-total">$0.00</span>
                </div>
                <div class="cost-preview-row mt-2">
                  <span>Per Site</span><span id="preview-per-site">—</span>
                </div>
              </div>

              <div class="sites-block">
                <div class="section-title">Sites</div>
                <div id="sites-container"></div>
                <button type="button" id="add-site-btn" class="btn btn-secondary add-site-btn">
                  + Add Another Site
                </button>
              </div>

            </div>
            <div class="card-footer">
              <button type="button" id="delete-btn" class="btn btn-danger">Delete Trip</button>
              <button type="submit" id="submit-btn" class="btn btn-primary">Save Changes</button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="../../js/config/config.js"></script>
  <script src="../../js/constants/index.js"></script>
  <script src="../../js/utils/date-formatter.js"></script>
  <script src="../../js/utils/cost-calculator.js"></script>
  <script src="../../js/utils/validator.js"></script>
  <script src="../../js/services/api.service.js"></script>
  <script src="../../js/services/auth.service.js"></script>
  <script src="../../js/services/trips.service.js"></script>
  <script src="../../js/services/sites.service.js"></script>
  <script src="../../js/services/notify.service.js"></script>
  <script src="../../js/components/navbar.js"></script>
  <script src="../../js/components/notification-bell.js"></script>
  <script src="../../js/components/modal.js"></script>
  <script src="../../js/pages/fleet/edit-trip.js"></script>
</body>
</html>
